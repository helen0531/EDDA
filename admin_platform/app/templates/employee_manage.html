<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="/static/css/style.css" rel="stylesheet">

<title>직원 관리</title>

</head>


<body>

<div class="container mt-5" style="max-width:700px">


<div class="card p-4">

<h4>직원 등록</h4>


<form action="/employee/manage" method="post" enctype="multipart/form-data">


<div class="mb-3">

<label style="font-size: 0.8rem;">이름</label>

<input name="name" class="form-control" required>

</div>



<div class="mb-3">

<label style="font-size: 0.8rem;">직번</label>

<input name="emp_no" class="form-control" required>

</div>



<div class="mb-3">

<label style="font-size: 0.8rem;">부서</label>

<input name="dept" class="form-control" required>

</div>



<div class="mb-3">

<label style="font-size: 0.8rem;">직급</label>

<input name="position" class="form-control" required>

</div>



<div class="mb-3">

<label style="font-size: 0.8rem;">근무시간</label>

<select name="work_type" class="form-select" required>

<option value="8-5">8:00 ~ 17:00</option>

<option value="9-6">9:00 ~ 18:00</option>

</select>

</div>



<div class="mb-3">

<label style="font-size: 0.8rem;">권한</label>

<select name="role" class="form-select" required>

<option value="employee">직원</option>

<option value="lead">리드엔지니어</option>

<option value="manager">팀장</option>

<option value="admin">관리자</option>

</select>

<div class="mb-3">

<label style="font-size: 0.8rem;">이메일</label>

<input name="email" class="form-control" type="email" required>

</div>

<div class="mb-3">

<label style="font-size: 0.8rem;">서명 이미지</label>

<input type="file" name="signature" class="form-control">

<small class="text-muted">
리드엔지니어 / 팀장 / 관리자만 등록
</small>

</div>



<div class="d-flex gap-2">
    <a href="/employee/list" class="btn btn-secondary w-100" style="padding-top: 0.25rem; padding-bottom: 0.25rem;">목록으로</a>
    <button class="btn btn-main w-100" style="padding-top: 0.25rem; padding-bottom: 0.25rem;">저장</button>
</div>



</form>


</div>

</div>


</body>

</html>
