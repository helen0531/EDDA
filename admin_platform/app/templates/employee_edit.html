<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>직원 수정</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/style.css?v=1.5" rel="stylesheet">
</head>
<body>
    <div class="container py-5">
        <div class="card p-4 mx-auto" style="max-width: 700px;">
            <h3 class="mb-4">직원 정보 수정</h3>

            <form action="/employee/edit" method="post" enctype="multipart/form-data">
                <input type="hidden" name="id" value="{{ employee[0] }}">

                <div class="mb-3">
                    <label class="form-label">이름</label>
                    <input name="name" class="form-control" value="{{ employee[1] }}">
                </div>

                <div class="mb-3">
                    <label class="form-label">직번</label>
                    <input name="emp_no" class="form-control" value="{{ employee[2] }}">
                </div>

                <div class="mb-3">
                    <label class="form-label">부서</label>
                    <input name="dept" class="form-control" value="{{ employee[3] }}">
                </div>

                <div class="mb-3">
                    <label class="form-label">직급</label>
                    <input name="position" class="form-control" value="{{ employee[4] }}">
                </div>

                <div class="mb-3">
                    <label class="form-label">근무시간</label>
                    <select name="work_type" class="form-select">
                        <option value="8-5" {% if employee[5] == "8-5" %}selected{% endif %}>8:00 ~ 17:00</option>
                        <option value="9-6" {% if employee[5] == "9-6" %}selected{% endif %}>9:00 ~ 18:00</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">권한</label>
                    <select name="role" class="form-select">
                        <option value="employee" {% if employee[6] == "employee" %}selected{% endif %}>직원</option>
                        <option value="lead" {% if employee[6] == "lead" %}selected{% endif %}>리드엔지니어</option>
                        <option value="manager" {% if employee[6] == "manager" %}selected{% endif %}>팀장</option>
                        <option value="admin" {% if employee[6] == "admin" %}selected{% endif %}>관리자</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">이메일</label>
                    <input name="email" class="form-control" value="{{ employee[7] }}">
                </div>

                <div class="mb-3">
                    <label class="form-label">서명</label>
                    {% if employee[8] %}
                        <img src="data:image/png;base64,{{ employee[8] }}" alt="signature" width="150" class="d-block mb-2">
                    {% endif %}
                    <input type="file" name="signature" class="form-control">
                </div>

                <div class="d-flex gap-2">
    <a href="/dashboard" class="btn btn-secondary w-100">목록으로</a>
    <button type="submit" class="btn btn-main w-100">수정 저장</button>
</div>
            </form>
        </div>
    </div>
</body>
</html>
