{% extends "base.html" %}

{% block title %}설정{% endblock %}

{% block content %}
    <div class="card p-4 mx-auto" style="max-width: 600px;">
        <h3 class="mb-4">시간외 근무 및 문서 설정</h3>
        {% if message %}
            <div class="alert alert-success">{{ message }}</div>
        {% endif %}
        <form method="post">
            <div class="mb-3">
                <label for="max_overtime_hours" class="form-label">월 최대 시간외 근무 시간</label>
                <input type="number" id="max_overtime_hours" name="max_overtime_hours" class="form-control" value="{{ max_overtime_hours }}" required>
            </div>
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="start_date" class="form-label">시작일</label>
                        <input type="date" id="start_date" name="start_date" class="form-control" value="{{ start_date }}">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="end_date" class="form-label">종료일</label>
                        <input type="date" id="end_date" name="end_date" class="form-control" value="{{ end_date }}">
                    </div>
                </div>
            </div>
            <hr class="my-4">
            <h3 class="mb-4">문서 승인자 설정</h3>
            <div class="mb-3">
                <label for="pdf_approver" class="form-label">문서 승인자</label>
                <select id="pdf_approver" name="pdf_approver" class="form-select">
                    <option value="">-- 승인자 선택 --</option>
                    {% for employee in employees %}
                        <option value="{{ employee.name }}" {% if employee.name == pdf_approver %}selected{% endif %}>{{ employee.name }}</option>
                    {% endfor %}
                </select>
                <small class="text-muted">여기서 선택된 승인자가 모든 PDF 문서에 기본으로 표시됩니다. 지정하지 않으면 요청의 최종 승인자가 표시됩니다.</small>
            </div>

            <button type="submit" class="btn btn-primary">저장</button>
        </form>
    </div>
    <div class="mt-3 mx-auto" style="max-width: 600px;">
        <a href="/dashboard" class="btn btn-secondary w-100" style="padding: 0.25rem 0.5rem; font-size: .875rem;">홈으로</a>
    </div>
{% endblock %}
